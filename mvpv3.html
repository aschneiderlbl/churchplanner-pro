<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ChurchPlannerPro — Christ Lutheran</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Color tokens (from design-guidelines) */
    --primary: #2563EB;
    --primary-hover: #1D4ED8;
    --primary-light: #DBEAFE;
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --text: #111827;
    --text-secondary: #6B7280;
    --text-disabled: #9CA3AF;
    --cta: #22C55E;
    --cta-hover: #16A34A;
    --cta-light: #DCFCE7;
    --warning: #F59E0B;
    --warning-light: #FEF3C7;
    --error: #EF4444;
    --error-light: #FEE2E2;

    /* Spacing (8px system) */
    --xs: 4px; --sm: 8px; --md: 16px; --lg: 24px; --xl: 32px; --xxl: 48px;

    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 2px rgba(17,24,39,.04);
    --shadow-md: 0 1px 3px rgba(17,24,39,.06), 0 4px 12px rgba(17,24,39,.04);
    --shadow-lg: 0 4px 6px rgba(17,24,39,.05), 0 12px 24px rgba(17,24,39,.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: var(--primary); text-decoration: none; }

  /* ---- Layout ---- */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

  /* ---- Sidebar ---- */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: var(--lg) var(--md);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: baseline; gap: 6px;
    padding: var(--sm) var(--sm) var(--lg);
    margin-bottom: var(--sm);
  }
  .brand-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .brand-name .pro { font-size: 9px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.08em; vertical-align: super; }
  .nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500;
    color: var(--text-secondary);
    transition: background-color 150ms ease-out, color 150ms ease-out;
    text-align: left;
    width: 100%;
  }
  .nav-item:hover { background: #F3F4F6; color: var(--text); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); }
  .nav-item.active svg { color: var(--primary); }
  .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--text-secondary); }
  .nav-item.active svg { color: var(--primary); }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding-top: var(--md);
    display: flex; align-items: center; gap: 12px;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #DBEAFE, #BFDBFE);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
    flex-shrink: 0;
  }
  .admin-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .admin-role { font-size: 12px; color: var(--text-secondary); }

  /* ---- Main column ---- */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--xl);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .church-name { font-size: 14px; color: var(--text-secondary); }
  .church-name strong { color: var(--text); font-weight: 600; }
  .topbar-actions { display: flex; align-items: center; gap: var(--sm); }
  .icon-btn {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-md); color: var(--text-secondary);
    transition: background 150ms ease-out;
  }
  .icon-btn:hover { background: #F3F4F6; color: var(--text); }
  .icon-btn svg { width: 20px; height: 20px; }

  .content { flex: 1; padding: var(--xl); }

  /* ---- Typography ---- */
  h1.page-title { font-size: 32px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.02em; }
  h2.section-title { font-size: 24px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  h3.subsection { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .page-subtitle { color: var(--text-secondary); font-size: 14px; margin: 0; }
  .caption { font-size: 12px; color: var(--text-secondary); }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500;
    transition: background-color 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out;
    min-height: 36px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .btn-primary { background: var(--cta); color: white; }
  .btn-primary:hover { background: var(--cta-hover); }
  .btn-secondary { background: var(--surface); color: var(--primary); border-color: var(--primary); }
  .btn-secondary:hover { background: var(--primary-light); }
  .btn-neutral { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn-neutral:hover { background: #F9FAFB; }
  .btn-text { padding: 6px 8px; color: var(--primary); min-height: auto; }
  .btn-text:hover { background: var(--primary-light); }
  .btn-danger-text { padding: 6px 8px; color: var(--error); min-height: auto; }
  .btn-danger-text:hover { background: var(--error-light); }
  .btn-sm { min-height: 32px; padding: 6px 12px; font-size: 13px; }
  .btn svg { width: 16px; height: 16px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- Inputs ---- */
  .input, .textarea, .select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    transition: border-color 150ms ease-out, box-shadow 150ms ease-out;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }
  .input::placeholder, .textarea::placeholder { color: var(--text-disabled); }
  .textarea { min-height: 80px; resize: vertical; }
  .label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .field { margin-bottom: var(--md); }

  .search {
    position: relative; display: flex; align-items: center;
  }
  .search svg { position: absolute; left: 12px; width: 16px; height: 16px; color: var(--text-disabled); pointer-events: none; }
  .search input { padding-left: 36px; }

  /* ---- Cards ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--lg);
  }
  .card-tight { padding: var(--md); }
  .card-flush { padding: 0; overflow: hidden; }

  /* ---- Sub tabs ---- */
  .subtabs { display: flex; gap: var(--xs); border-bottom: 1px solid var(--border); margin-bottom: var(--lg); }
  .subtab {
    padding: 10px 14px;
    font-size: 14px; font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 150ms ease-out, border-color 150ms ease-out;
  }
  .subtab:hover { color: var(--text); }
  .subtab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ---- People list / detail layout ---- */
  .split { display: grid; grid-template-columns: 360px 1fr; gap: var(--lg); align-items: start; }
  @media (max-width: 1100px) { .split { grid-template-columns: 1fr; } }

  .list { display: flex; flex-direction: column; }
  .list-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px var(--md);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms ease-out;
    text-align: left;
    width: 100%;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: #F9FAFB; }
  .list-row.active { background: var(--primary-light); }
  .list-row.active .row-name { color: var(--primary); }
  .row-name { font-weight: 500; font-size: 14px; }
  .row-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .row-meta { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--md);
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .list-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .list-count { font-size: 12px; color: var(--text-secondary); }

  /* ---- Member detail ---- */
  .detail-header { display: flex; align-items: center; gap: var(--md); padding-bottom: var(--lg); border-bottom: 1px solid var(--border); margin-bottom: var(--lg); }
  .detail-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, #DBEAFE, #93C5FD);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 22px;
    flex-shrink: 0;
  }
  .detail-name { font-size: 24px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .detail-meta { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }
  .detail-actions { margin-left: auto; display: flex; gap: 8px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--lg) var(--xl); margin-bottom: var(--xl); }
  @media (max-width: 800px) { .info-grid { grid-template-columns: 1fr; gap: var(--md); } }
  .info-block h4 { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 var(--sm); }
  .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: var(--text-secondary); }
  .info-val { color: var(--text); font-weight: 500; }
  .info-val.empty { color: var(--text-disabled); font-weight: 400; font-style: italic; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 4px 10px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
  }
  .chip-neutral { background: #F3F4F6; color: var(--text-secondary); }
  .chip-success { background: var(--cta-light); color: #15803D; }
  .chip-warning { background: var(--warning-light); color: #B45309; }

  .activity { display: flex; flex-direction: column; gap: 4px; }
  .activity-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .activity-row:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-top: 7px; flex-shrink: 0; }
  .activity-text { font-size: 14px; }
  .activity-time { font-size: 12px; color: var(--text-secondary); }

  .notes-block { background: #FEFCE8; border-left: 3px solid #F59E0B; padding: 12px 14px; border-radius: var(--radius-md); font-size: 14px; line-height: 1.55; color: #78350F; }

  /* ---- Family ---- */
  .family-card { display: flex; flex-direction: column; gap: 12px; }
  .family-members-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .member-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px 6px 6px;
    background: #F3F4F6;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
  }
  .member-pill .avatar { width: 24px; height: 24px; font-size: 11px; }

  /* ---- Forms tab ---- */
  .form-row {
    display: grid; grid-template-columns: 1fr 120px 120px 100px 36px;
    align-items: center;
    gap: var(--md);
    padding: 14px var(--md);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms ease-out;
  }
  .form-row:last-child { border-bottom: none; }
  .form-row:hover { background: #F9FAFB; }
  .form-row .form-name { font-weight: 500; font-size: 14px; }
  .form-row .form-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .form-builder-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--lg);
    gap: var(--md);
  }
  .builder-tabs { display: flex; gap: 0; background: #F3F4F6; padding: 4px; border-radius: var(--radius-md); }
  .builder-tab {
    padding: 6px 14px;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
  }
  .builder-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

  .builder-questions-header { padding: 0 var(--xs); margin-bottom: var(--sm); }
  .builder-questions { display: flex; flex-direction: column; gap: var(--sm); }

  /* Wrapper holds the question card AND the floating action toolbar */
  .question-wrap { position: relative; }
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid transparent;
    border-radius: var(--radius-lg);
    padding: var(--md) var(--lg);
    transition: border-left-color 150ms ease-out, box-shadow 150ms ease-out;
  }
  .question-wrap.focused .question-card { border-left-color: var(--primary); box-shadow: var(--shadow-md); }
  .question-index { font-size: 11px; font-weight: 600; color: var(--text-disabled); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

  .question-row { display: flex; gap: var(--md); align-items: center; margin-bottom: var(--md); }
  .question-row .select { flex: 0 0 200px; }
  .options-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: var(--md); }
  .option-row { display: flex; align-items: center; gap: 10px; }
  .option-row .marker { width: 18px; height: 18px; border: 1.5px solid var(--border-strong); flex-shrink: 0; }
  .option-row .marker.radio { border-radius: 50%; }
  .option-row .marker.check { border-radius: 4px; }
  .option-row .input { padding: 6px 10px; border: none; border-bottom: 1px solid var(--border); border-radius: 0; background: transparent; }
  .option-row .input:focus { box-shadow: none; border-bottom-color: var(--primary); }
  .icon-btn-sm { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--text-disabled); }
  .icon-btn-sm:hover { color: var(--text); background: #F3F4F6; }
  .icon-btn-sm svg { width: 14px; height: 14px; }
  .preview-field { margin-bottom: var(--md); background: #F9FAFB; }

  .question-footer { display: flex; align-items: center; justify-content: flex-end; gap: var(--md); padding-top: var(--md); border-top: 1px solid var(--border); }

  /* Floating toolbar to the right of focused question */
  .question-toolbar {
    position: absolute;
    top: 8px;
    right: -52px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transform: translateX(-8px);
    pointer-events: none;
    transition: opacity 150ms ease-out, transform 150ms ease-out;
  }
  .question-wrap.focused .question-toolbar { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .toolbar-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    transition: background 120ms ease-out, color 120ms ease-out;
  }
  .toolbar-btn:hover { background: #F3F4F6; color: var(--text); }
  .toolbar-btn-danger:hover { color: var(--error); background: var(--error-light); }
  .toolbar-btn svg { width: 16px; height: 16px; }
  @media (max-width: 1280px) {
    /* Tuck toolbar inside on narrower screens */
    .question-toolbar { right: 8px; top: -42px; flex-direction: row; }
  }
  .toggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle input { display: none; }
  .toggle .switch {
    width: 32px; height: 18px; border-radius: 999px;
    background: var(--border-strong);
    position: relative;
    transition: background 150ms ease-out;
  }
  .toggle .switch::before {
    content: ''; position: absolute; left: 2px; top: 2px;
    width: 14px; height: 14px; border-radius: 50%; background: white;
    transition: transform 150ms ease-out;
  }
  .toggle input:checked + .switch { background: var(--primary); }
  .toggle input:checked + .switch::before { transform: translateX(14px); }
  .toggle .label-text { font-size: 13px; color: var(--text); }

  /* ---- Responses ---- */
  .table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .table th, .table td { text-align: left; padding: 12px var(--md); border-bottom: 1px solid var(--border); }
  .table th { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; background: #F9FAFB; }
  .table tr:last-child td { border-bottom: none; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--md); margin-bottom: var(--lg); }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--md) var(--lg); }
  .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 600; margin-top: 4px; letter-spacing: -0.02em; }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(17,24,39,.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: var(--xl) var(--md); z-index: 50;
    overflow-y: auto;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    width: 100%; max-width: 720px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .modal-lg { max-width: 820px; }
  .modal-xl { max-width: 1120px; }

  /* CSV preview table inside import modal */
  .csv-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-md); }
  .csv-preview-table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .csv-preview-table th, .csv-preview-table td { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 12px; text-align: left; vertical-align: top; }
  .csv-preview-table th:last-child, .csv-preview-table td:last-child { border-right: none; }
  .csv-preview-table th { background: #F9FAFB; min-width: 180px; }
  .csv-preview-table tr:last-child td { border-bottom: none; }
  .csv-map-select { width: 100%; padding: 6px 10px; font-size: 13px; }
  .csv-header-name { margin-top: 4px; font-size: 11px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .csv-cell-mapped { color: var(--text); }
  .csv-cell-skipped { color: var(--text-disabled); background: #F9FAFB; }
  .modal-head { padding: var(--lg) var(--lg) var(--md); border-bottom: 1px solid var(--border); display:flex; align-items: center; justify-content: space-between; }
  .modal-body { padding: var(--lg); max-height: 70vh; overflow-y: auto; }
  .modal-footer { padding: var(--md) var(--lg); border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* Form sections inside modals */
  .form-section { padding-bottom: var(--lg); margin-bottom: var(--lg); border-bottom: 1px solid var(--border); }
  .form-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .form-section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--md); display: flex; align-items: center; gap: 8px; }
  .form-section-hint { font-size: 11px; font-weight: 500; color: var(--text-disabled); text-transform: none; letter-spacing: 0; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--md); }
  @media (max-width: 700px) { .form-row-2 { grid-template-columns: 1fr; } }
  .req { color: var(--error); }

  /* ---- Settings ---- */
  .integration-row { display: flex; align-items: center; gap: var(--md); padding: var(--md) 0; border-bottom: 1px solid var(--border); }
  .integration-row:last-child { border-bottom: none; }
  .integration-icon {
    width: 40px; height: 40px; border-radius: 8px; background: #F3F4F6;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .integration-name { font-weight: 600; }
  .integration-desc { font-size: 12px; color: var(--text-secondary); }
  .integration-row .grow { flex: 1; }

  /* ---- Toast ---- */
  .toast-stack { position: fixed; bottom: var(--lg); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast {
    background: #111827; color: white;
    padding: 10px 16px;
    border-radius: var(--radius-md);
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 8px;
    animation: toastIn 200ms ease-out;
  }
  .toast.success { background: #166534; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Misc ---- */
  .row-flex { display: flex; align-items: center; gap: var(--sm); }
  .grow { flex: 1; }
  .empty {
    text-align: center;
    padding: var(--xxl) var(--md);
    color: var(--text-secondary);
  }
  .empty svg { width: 32px; height: 32px; color: var(--text-disabled); margin-bottom: var(--sm); }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); margin-bottom: var(--md); }
  .breadcrumb a { color: var(--text-secondary); cursor: pointer; }
  .breadcrumb a:hover { color: var(--primary); }
  .divider { height: 1px; background: var(--border); margin: var(--lg) 0; }
  .hr-text { display: flex; align-items: center; gap: var(--md); color: var(--text-secondary); font-size: 12px; margin: var(--md) 0; }
  .hr-text::before, .hr-text::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .copy-link-row { display: flex; gap: 8px; align-items: center; padding: 12px; background: #F9FAFB; border: 1px solid var(--border); border-radius: var(--radius-md); }
  .copy-link-row code { flex: 1; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- Onboarding ---- */
  .onb-overlay {
    position: fixed; inset: 0;
    background: rgba(17,24,39,.55);
    display: flex; align-items: center; justify-content: center;
    padding: var(--lg) var(--md);
    z-index: 60; overflow-y: auto;
    animation: onbFade 200ms ease-out;
  }
  @keyframes onbFade { from { opacity: 0; } to { opacity: 1; } }
  .onb-modal {
    background: var(--surface); border-radius: var(--radius-lg);
    width: 100%; max-width: 680px;
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    max-height: 92vh;
    overflow: hidden;
    animation: onbPop 240ms cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes onbPop { from { opacity: 0; transform: translateY(8px) scale(.985); } to { opacity: 1; transform: none; } }
  .onb-head { padding: var(--lg) var(--lg) 0; }
  .onb-stepper { display: flex; gap: 8px; align-items: center; margin-bottom: var(--lg); }
  .onb-step-pill { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-disabled); }
  .onb-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: #F3F4F6; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
    transition: background 150ms ease, color 150ms ease;
  }
  .onb-step-pill.active .onb-step-num { background: var(--primary); color: white; }
  .onb-step-pill.done .onb-step-num { background: var(--cta); color: white; }
  .onb-step-pill.active .onb-step-label { color: var(--text); font-weight: 600; }
  .onb-step-pill.done .onb-step-label { color: var(--text); }
  .onb-step-num svg { width: 12px; height: 12px; }
  .onb-step-connector { flex: 1; height: 2px; background: var(--border); border-radius: 2px; transition: background 150ms ease; }
  .onb-step-connector.done { background: var(--cta); }
  .onb-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0; color: var(--text); }
  .onb-subtitle { color: var(--text-secondary); margin: 6px 0 var(--lg); font-size: 14px; }
  .onb-body { padding: 0 var(--lg) var(--lg); overflow-y: auto; flex: 1; }
  .onb-footer {
    padding: var(--md) var(--lg);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: #FCFCFD;
  }
  .onb-skip {
    background: none; border: none; color: var(--text-secondary);
    font-size: 13px; cursor: pointer; padding: 6px 0;
    font-family: inherit;
  }
  .onb-skip:hover { color: var(--text); text-decoration: underline; }
  .onb-actions { display: flex; gap: 8px; }

  /* Drop zone */
  .onb-dropzone {
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: var(--xxl) var(--lg);
    text-align: center; background: #F9FAFB;
    cursor: pointer;
    transition: all 150ms ease;
  }
  .onb-dropzone:hover { border-color: var(--primary); background: #F0F5FF; }
  .onb-dropzone.dragover { border-color: var(--primary); background: var(--primary-light); border-style: solid; }
  .onb-dropzone.success { border-style: solid; border-color: var(--cta); background: var(--cta-light); cursor: default; }
  .onb-dropzone-icon {
    width: 48px; height: 48px;
    margin: 0 auto var(--sm);
    color: var(--text-secondary);
    display: block;
  }
  .onb-dropzone.success .onb-dropzone-icon { color: var(--cta-hover); }
  .onb-dropzone-title { font-weight: 600; font-size: 15px; color: var(--text); }
  .onb-dropzone-sub { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
  .onb-link-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-top: var(--md);
    font-size: 13px; color: var(--text-secondary);
    flex-wrap: wrap;
  }
  .onb-link-row .dot { color: var(--text-disabled); }
  .onb-link-btn {
    background: none; border: none; padding: 0;
    color: var(--primary); cursor: pointer; font: inherit; font-weight: 500;
  }
  .onb-link-btn:hover { text-decoration: underline; }

  /* CSV preview after upload */
  .onb-preview { margin-top: var(--md); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .onb-preview-head {
    padding: 10px 14px; background: #F9FAFB; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .onb-pill-good { background: var(--cta-light); color: #166534; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: none; letter-spacing: 0; }
  .onb-preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .onb-preview-table th, .onb-preview-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); text-align: left; }
  .onb-preview-table th { font-weight: 500; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; background: #FBFCFD; }
  .onb-preview-table tr:last-child td { border-bottom: none; }
  .onb-preview-table .muted { color: var(--text-disabled); }

  /* Invite step */
  .onb-invite-hero {
    display: flex; gap: var(--md); align-items: center;
    padding: var(--md); background: #F9FAFB;
    border: 1px solid var(--border); border-radius: var(--radius-md);
    margin-bottom: var(--lg);
  }
  .onb-invite-hero-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--primary-light); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .onb-invite-hero-icon svg { width: 20px; height: 20px; }
  .onb-invite-hero-title { font-weight: 600; font-size: 14px; }
  .onb-invite-hero-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .onb-sent-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--cta-light); color: #166534;
    border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
    margin-bottom: var(--md);
  }
  .onb-sent-banner svg { width: 16px; height: 16px; }

  /* Template grid */
  .onb-template-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: var(--md);
  }
  @media (max-width: 600px) { .onb-template-grid { grid-template-columns: 1fr; } }
  .onb-template-card {
    border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: var(--md); cursor: pointer;

    font: inherit; color: inherit;
    display: block; width: 100%;

  .onb-template-card.selected {

    background: #F3F6FE;

  .onb-template-icon {
    width: 36px; height: 36px; border-radius: 8px;

  if (!iso) return null;

  let a = now.getFullYear() - b.getFullYear();
  const mo = now.getMonth() - b.getMonth();
  if (mo < 0 || (mo === 0 && now.getDate() < b.getDate())) a--;
  return a >= 0 ? a : null;
};

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  while (rows.length && rows[rows.length-1].every(x => !x)) rows.pop();
  return rows;
}

const NORM = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g, '');

function autoMapHeaders(headers) {
  const map = {};
  const claimed = new Set();
  // Pass 1: exact normalized match
  headers.forEach((h, i) => {
    const n = NORM(h);
    for (const f of CSV_FIELDS) {
      if (claimed.has(f.key)) continue;
      if (f.patterns.some(p => p === n)) { map[i] = f.key; claimed.add(f.key); break; }
    }
  });
  // Pass 2: contains match for unmapped columns
  headers.forEach((h, i) => {
    if (i in map) return;
    const n = NORM(h);
    for (const f of CSV_FIELDS) {
      if (claimed.has(f.key)) continue;
      if (f.patterns.some(p => n.includes(p) || p.includes(n))) { map[i] = f.key; claimed.add(f.key); break; }
    }
  });
  return map;
}

function loadCsvText(text) {
  const rows = parseCSV(text || '');
  if (rows.length < 2) { toast('CSV needs a header row plus at least one data row.', 'error'); return; }
  state.csvImportRows = rows;
  state.csvImportMapping = autoMapHeaders(rows[0]);
  state.csvImportPasteMode = false;
  state.csvImportText = '';
  state.csvImportOpen = true;
  render();
}

function FormBuilder(f) {
  return `

}

function QuestionCard(formId, q, index, total) {
  const focused = state.focusedQuestionId === q.id;
  const showOptions = (q.type === 'multiple' || q.type === 'checkboxes');
  return `
    <div class="question-wrap ${focused?'focused':''}" data-question-card="${q.id}">
      <div class="question-card">
        <div class="question-index">Question ${index+1} of ${total}</div>
        <div class="question-row">
          <input class="input grow" placeholder="Question text" value="${escape(q.text)}"
                 data-q-field="text" data-form-id="${formId}" data-q-id="${q.id}" />
          <select class="select" data-q-field="type" data-form-id="${formId}" data-q-id="${q.id}">
            <option value="short" ${q.type==='short'?'selected':''}>Short answer</option>
            <option value="paragraph" ${q.type==='paragraph'?'selected':''}>Paragraph</option>
            <option value="multiple" ${q.type==='multiple'?'selected':''}>Multiple choice</option>
            <option value="checkboxes" ${q.type==='checkboxes'?'selected':''}>Checkboxes</option>
          </select>
        </div>

        ${ showOptions ? `
          <div class="options-list">
            ${ q.options.map((opt, i) => `
              <div class="option-row">
                <span class="marker ${q.type==='multiple'?'radio':'check'}"></span>
                <input class="input grow" value="${escape(opt)}" placeholder="Option ${i+1}"
                       data-opt-field="text" data-form-id="${formId}" data-q-id="${q.id}" data-opt-i="${i}"/>
                <button class="icon-btn-sm" title="Remove option" data-action="remove-option" data-form-id="${formId}" data-q-id="${q.id}" data-opt-i="${i}"><svg><use href="#i-x"/></svg></button>
              </div>
            `).join('') }
            <button class="btn btn-text" style="margin-left: 28px;" data-action="add-option" data-form-id="${formId}" data-q-id="${q.id}">
              <svg><use href="#i-plus"/></svg> Add option
            </button>
          </div>` : '' }

        ${ q.type === 'short' ? `<input class="input preview-field" disabled placeholder="Short answer (member's response)"/>` : '' }
        ${ q.type === 'paragraph' ? `<textarea class="textarea preview-field" disabled placeholder="Long answer (member's response)"></textarea>` : '' }

        <div class="question-footer">
          <label class="toggle">
            <input type="checkbox" ${q.required?'checked':''} data-q-field="required" data-form-id="${formId}" data-q-id="${q.id}" />
            <span class="switch"></span>
            <span class="label-text">Required</span>
          </label>
        </div>
      </div>

      <!-- Floating action toolbar shown when card is focused -->
      <div class="question-toolbar" aria-hidden="${focused ? 'false' : 'true'}">
        <button class="toolbar-btn" title="Insert question below" data-action="insert-question-below" data-form-id="${formId}" data-q-id="${q.id}">
          <svg><use href="#i-plus"/></svg>
        </button>
        <button class="toolbar-btn" title="Duplicate" data-action="duplicate-question" data-form-id="${formId}" data-q-id="${q.id}">
          <svg><use href="#i-copy"/></svg>
        </button>
        <button class="toolbar-btn toolbar-btn-danger" title="Delete" data-action="delete-question" data-form-id="${formId}" data-q-id="${q.id}">
          <svg><use href="#i-trash"/></svg>
        </button>
      </div>
    </div>
  `;
}

function FormResponses(f) {
  if (!f.responses.length) {
    return `<div class="card empty">
      <svg><use href="#i-form"/></svg>
      <div style="font-weight:600; margin-bottom: 4px;">No responses yet</div>
      <div>Once members submit ${escape(f.title)}, their answers will appear here.</div>
    </div>`;
  }
  const cols = f.questions.slice(0, 5);
  return `
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Total responses</div><div class="stat-value">${f.responses.length}</div></div>
      <div class="stat"><div class="stat-label">Required questions</div><div class="stat-value">${f.questions.filter(q=>q.required).length}</div></div>
      <div class="stat"><div class="stat-label">Last submission</div><div class="stat-value" style="font-size:18px; padding-top:8px;">${escape(f.responses[0].submittedAt)}</div></div>
    </div>
    <div class="card card-flush">
      <table class="table">
        <thead>
          <tr>
            <th>Member</th>
            ${ cols.map(c => `<th>${escape(c.text)}</th>`).join('') }
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody>
          ${ f.responses.map(r => {

            return `<tr>

function FillField(q) {
  const v = state.fillAnswers[q.id];
  const req = q.required ? `<span style="color: var(--error);"> *</span>` : '';
  if (q.type === 'short') {
    return `<div class="field">
      <label class="label">${escape(q.text)}${req}</label>
      <input class="input" value="${escape(v||'')}" data-fill="${q.id}" />
    </div>`;
  }
  if (q.type === 'paragraph') {
    return `<div class="field">
      <label class="label">${escape(q.text)}${req}</label>
      <textarea class="textarea" data-fill="${q.id}">${escape(v||'')}</textarea>
    </div>`;
  }
  if (q.type === 'multiple') {
    return `<div class="field">
      <label class="label">${escape(q.text)}${req}</label>
      ${ q.options.map(opt => `
        <label class="row-flex" style="padding: 6px 0; cursor:pointer;">
          <input type="radio" name="${q.id}" value="${escape(opt)}" ${v===opt?'checked':''} data-fill-radio="${q.id}" />
          <span>${escape(opt)}</span>
        </label>`).join('') }
    </div>`;
  }
  if (q.type === 'checkboxes') {
    const arr = Array.isArray(v) ? v : [];
    return `<div class="field">
      <label class="label">${escape(q.text)}${req}</label>
      ${ q.options.map(opt => `
        <label class="row-flex" style="padding: 6px 0; cursor:pointer;">
          <input type="checkbox" value="${escape(opt)}" ${arr.includes(opt)?'checked':''} data-fill-check="${q.id}" />
          <span>${escape(opt)}</span>
        </label>`).join('') }
    </div>`;
  }
  return '';
}

// ====================== CSV Import Modal ======================
function CsvImportModal() {
  const headers = state.csvImportRows[0] || [];
  const data    = state.csvImportRows.slice(1);
  const previewRows = data.slice(0, 8);
  const more = Math.max(0, data.length - previewRows.length);

  const mappedFields = Object.values(state.csvImportMapping);
  const mappedCount = new Set(mappedFields).size;
  const importable = data.filter(r => {
    const fIdx = headerIdxFor('firstName');
    const lIdx = headerIdxFor('lastName');
    return fIdx != null && lIdx != null && r[fIdx]?.trim() && r[lIdx]?.trim();
  }).length;

  const hasFirst = mappedFields.includes('firstName');
  const hasLast  = mappedFields.includes('lastName');

  return `
    <div class="modal-overlay" data-action="close-csv-import">
      <div class="modal modal-xl" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div>
            <h3 class="subsection">Import members</h3>
            <div class="caption" style="margin-top: 4px;">${data.length} row${data.length===1?'':'s'} detected · ${headers.length} columns · ${mappedCount} fields mapped automatically</div>
          </div>
          <button class="icon-btn" data-action="close-csv-import"><svg><use href="#i-x"/></svg></button>
        </div>

        ${ (!hasFirst || !hasLast) ? `
          <div style="margin: 0 var(--lg); padding: 10px 14px; background: var(--warning-light); color: #78350F; border-radius: var(--radius-md); font-size: 13px;">
            Map columns to <strong>First name</strong> and <strong>Last name</strong> below to enable import.
          </div>` : '' }

        <div class="modal-body">
          <div class="form-section-title">Column mapping <span class="form-section-hint">Click a dropdown to change the field a column maps to</span></div>

          <div class="csv-table-wrap">
            <table class="csv-preview-table">
              <thead>
                <tr>
                  ${ headers.map((h, i) => `
                    <th>
                      <select class="select csv-map-select" data-csv-map="${i}">
                        <option value="">— Skip column —</option>
                        ${ CSV_FIELDS.map(f => `<option value="${f.key}" ${state.csvImportMapping[i]===f.key?'selected':''}>${escape(f.label)}</option>`).join('') }
                      </select>
                      <div class="csv-header-name">${escape(h || `Column ${i+1}`)}</div>
                    </th>
                  `).join('') }
                </tr>
              </thead>
              <tbody>
                ${ previewRows.map(r => `
                  <tr>
                    ${ headers.map((_, i) => {
                      const v = r[i] || '';
                      const mapped = state.csvImportMapping[i];
                      return `<td class="${mapped?'csv-cell-mapped':'csv-cell-skipped'}" title="${escape(v)}">${escape(v).slice(0, 80)}${v.length>80?'…':''}</td>`;
                    }).join('') }
                  </tr>
                `).join('') }
              </tbody>
            </table>
          </div>
          ${ more > 0 ? `<div class="caption" style="margin-top: var(--sm);">+ ${more} more row${more===1?'':'s'} not shown in preview.</div>` : '' }
        </div>

        <div class="modal-footer" style="justify-content: space-between;">
          <div class="caption">${importable} of ${data.length} rows are ready to import.</div>
          <div style="display:flex; gap: 8px;">
            <button class="btn btn-neutral" data-action="close-csv-import">Cancel</button>
            <button class="btn btn-primary" data-action="csv-perform-import" ${(importable===0 || !hasFirst || !hasLast)?'disabled':''}>
              <svg><use href="#i-check"/></svg> Import ${importable} member${importable===1?'':'s'}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function headerIdxFor(fieldKey) {
  for (const [i, k] of Object.entries(state.csvImportMapping)) {
    if (k === fieldKey) return +i;
  }
  return null;
}

function performCsvImport() {
  const headers = state.csvImportRows[0];
  const data    = state.csvImportRows.slice(1);
  const mapping = state.csvImportMapping; // colIdx -> fieldKey

  let imported = 0;
  for (const row of data) {
    const obj = {};
    Object.entries(mapping).forEach(([col, field]) => {
      const v = (row[+col] || '').trim();
      if (!v) return;
      if (field === 'skills') obj.skills = v.split(',').map(s => s.trim()).filter(Boolean);
      else if (field === 'family') obj.familyName = v;
      else obj[field] = v;
    });
    if (!obj.firstName || !obj.lastName) continue;

    // Resolve family by name (create if missing)
    let familyId = null;
    if (obj.familyName) {
      let fam = state.families.find(f => f.name.toLowerCase() === obj.familyName.toLowerCase());
      if (!fam) {
        fam = { id: uid('f'), name: obj.familyName, address: obj.address || '' };
        state.families.push(fam);
      }
      familyId = fam.id;
    }

    state.members.push({
      id: uid('m'),
      familyId,
      firstName: obj.firstName,
      lastName: obj.lastName,
      birthdate: obj.birthdate || null,
      email: obj.email || null,
      phone: obj.phone || null,
      address: obj.address || null,
      membership: obj.membership || null,
      baptism: obj.baptism || null,
      firstCommunion: obj.firstCommunion || null,
      confirmation: obj.confirmation || null,
      marriage: obj.marriage || null,
      skills: obj.skills || [],
      notes: obj.notes || '',
      activity: [{ t: 'Imported from CSV', d: 'Just now' }]
    });
    imported++;
  }

  state.csvImportOpen = false;
  state.csvImportRows = [];
  state.csvImportMapping = {};
  render();
  toast(`Imported ${imported} member${imported===1?'':'s'}`);
}

function OnbStepper() {
  const s = state.onboardingStep;
  return `<div class="onb-stepper">
    ${ ONB_STEPS.map((label, i) => {
      const n = i + 1;
      const cls = n < s ? 'done' : n === s ? 'active' : '';
      const isLast = i === ONB_STEPS.length - 1;
      return `
        <div class="onb-step-pill ${cls}">
          <div class="onb-step-num">${ n < s ? '<svg><use href="#i-check"/></svg>' : n }</div>
          <div class="onb-step-label">${label}</div>
        </div>
        ${ !isLast ? `<div class="onb-step-connector ${n < s ? 'done' : ''}"></div>` : '' }
      `;
    }).join('') }
  </div>`;
}

function onboardingFinish(picked) {
  state.onboardingOpen = false;
  try { localStorage.setItem('cpp-onboarded', '1'); } catch (e) {}
  if (picked) {
    const t = ONB_TEMPLATES.find(x => x.key === picked);
    if (t) {
      const f = {
        id: uid('fm'),
        title: t.title === 'Blank form' ? 'Untitled form' : t.title,
        description: t.description || '',
        status: 'draft',
        createdAt: new Date().toISOString().slice(0,10),
        questions: structuredClone(t.questions).map(q => ({ ...q, id: uid('q') })),
        responses: []
      };
      state.forms.unshift(f);
      state.tab = 'forms';
      state.selectedFormId = f.id;
      state.formView = 'edit';
      render();
      toast(`Form "${f.title}" created`);
      return;
    }
  }
  render();
  toast('Setup complete — welcome aboard!');
}

// ====================== Toast ======================
function ToastStack() {
  if (!state.toasts.length) return '';
  return `<div class="toast-stack">
    ${ state.toasts.map(t => `<div class="toast ${t.kind==='success'?'success':''}"><svg style="width:14px;height:14px"><use href="#i-check"/></svg> ${escape(t.text)}</div>`).join('') }
  </div>`;
}

// ====================== Event wiring ======================
function attach() {
  // Sidebar nav
  $$('[data-nav]').forEach(b => b.onclick = () => {
    state.tab = b.dataset.nav;
    state.selectedFormId = null;
    render();
  });

  // People sub tabs
  $$('[data-people-sub]').forEach(b => b.onclick = () => {
    state.peopleSubtab = b.dataset.peopleSub;
    render();
  });

  // Member list
  $$('[data-select-member]').forEach(b => b.onclick = () => {
    state.selectedMemberId = b.dataset.selectMember;
    render();
  });

  // Member search (debounce-free; preserve focus)
  const search = document.querySelector('[data-action="member-search"]');
  if (search) {
    search.oninput = (e) => {
      state.memberSearch = e.target.value;
      render();
      const again = document.querySelector('[data-action="member-search"]');
      if (again) { again.focus(); again.setSelectionRange(state.memberSearch.length, state.memberSearch.length); }
    };
  }

  // Family pill -> open member
  $$('[data-jump-member]').forEach(b => b.onclick = () => {
    state.peopleSubtab = 'members';
    state.selectedMemberId = b.dataset.jumpMember;
    render();
  });

  // Form list / open
  $$('[data-open-form]').forEach(b => b.onclick = () => {
    state.selectedFormId = b.dataset.openForm;
    state.formView = 'edit';
    render();
  });

  // Form builder back
  $$('[data-form-back]').forEach(b => b.onclick = () => {
    state.selectedFormId = null;
    render();
  });

  // Builder tabs
  $$('[data-form-view]').forEach(b => b.onclick = () => {
    state.formView = b.dataset.formView;
    render();
  });

  // Form title/description edits
  $$('[data-form-field]').forEach(el => el.oninput = (e) => {
    const f = formById(el.dataset.id);
    if (!f) return;
    f[el.dataset.formField] = e.target.value;
  });

  // Question card focus state
  $$('[data-question-card]').forEach(card => {
    card.addEventListener('focusin', () => {
      state.focusedQuestionId = card.dataset.questionCard;
      render();
    });
  });

  // Question fields
  $$('[data-q-field]').forEach(el => {
    const handler = (e) => {
      const f = formById(el.dataset.formId);
      const q = f && f.questions.find(qq => qq.id === el.dataset.qId);
      if (!q) return;
      const field = el.dataset.qField;
      if (field === 'type') {
        q.type = e.target.value;
        if ((q.type === 'multiple' || q.type === 'checkboxes') && q.options.length === 0) {
          q.options = ['Option 1'];
        }
        render();
      } else if (field === 'required') {
        q.required = e.target.checked;
      } else {
        q[field] = e.target.value;
      }
    };
    el.oninput = handler;
    el.onchange = handler;
  });

  // Option text
  $$('[data-opt-field]').forEach(el => el.oninput = (e) => {
    const f = formById(el.dataset.formId);
    const q = f && f.questions.find(qq => qq.id === el.dataset.qId);
    if (!q) return;
    q.options[+el.dataset.optI] = e.target.value;
  });

  // Generic click actions
  $$('[data-action]').forEach(el => {
    el.onclick = (e) => {
      const a = el.dataset.action;
      if (a === 'add-member') {
        state.addMemberDraft = emptyMemberDraft();
        state.addMemberOpen = true;
        render();
      } else if (a === 'close-add-member') {
        if (el.dataset.action === 'close-add-member') {
          state.addMemberOpen = false;
          state.addMemberDraft = null;
          render();
        }
      } else if (a === 'save-add-member') {
        saveNewMember();
      } else if (a === 'edit-member') {
        toast('Editing member profile is coming soon.');
      } else if (a === 'email-member') {
        toast('Composer opened (demo).');
      } else if (a === 'create-form') {
        const f = { id: uid('fm'), title: 'Untitled form', description: '', status: 'draft', createdAt: new Date().toISOString().slice(0,10),
          questions: [{ id: uid('q'), text: '', type:'short', required:false, options:[], mapsTo:null }],
          responses: [] };
        state.forms.unshift(f);
        state.selectedFormId = f.id;
        state.formView = 'edit';
        render();
      } else if (a === 'add-question') {
        const f = formById(el.dataset.id);
        const q = { id: uid('q'), text:'', type:'short', required:false, options:[], mapsTo:null };
        f.questions.push(q);
        state.focusedQuestionId = q.id;
        render();
      } else if (a === 'insert-question-below') {
        const f = formById(el.dataset.formId);
        const idx = f.questions.findIndex(q => q.id === el.dataset.qId);
        const q = { id: uid('q'), text:'', type:'short', required:false, options:[], mapsTo:null };
        f.questions.splice(idx+1, 0, q);
        state.focusedQuestionId = q.id;
        render();
      } else if (a === 'duplicate-question') {
        const f = formById(el.dataset.formId);
        const q = f.questions.find(q => q.id === el.dataset.qId);
        const copy = JSON.parse(JSON.stringify(q));
        copy.id = uid('q');
        const i = f.questions.indexOf(q);
        f.questions.splice(i+1, 0, copy);
        render();
      } else if (a === 'delete-question') {
        const f = formById(el.dataset.formId);
        f.questions = f.questions.filter(q => q.id !== el.dataset.qId);
        render();
      } else if (a === 'add-option') {
        const f = formById(el.dataset.formId);
        const q = f.questions.find(q => q.id === el.dataset.qId);
        q.options.push('Option ' + (q.options.length+1));
        render();
      } else if (a === 'remove-option') {
        const f = formById(el.dataset.formId);
        const q = f.questions.find(q => q.id === el.dataset.qId);
        q.options.splice(+el.dataset.optI, 1);
        render();
      } else if (a === 'publish-form') {
        const f = formById(el.dataset.id);
        f.status = 'published';
        toast('Form published — link copied to clipboard.');
        render();
      } else if (a === 'copy-link') {
        const f = formById(el.dataset.id);
        const link = `https://forms.churchplannerpro.app/${f.id}`;
        navigator.clipboard?.writeText(link).catch(()=>{});
        toast('Link copied: ' + link);
      } else if (a === 'preview-form') {
        state.fillFormId = el.dataset.id;
        state.fillAnswers = {};
        render();
      } else if (a === 'close-fill') {
        // Only close when clicking the overlay or close buttons
        if (el.dataset.action === 'close-fill') {
          state.fillFormId = null;
          state.fillAnswers = {};
          render();
        }
      } else if (a === 'submit-fill') {
        submitFill();
      } else if (a === 'form-more') {
        toast('More options menu coming soon.');
      } else if (a === 'csv-pick-file') {
        const f = document.getElementById('csv-file-input');
        if (f) f.click();
      } else if (a === 'csv-paste') {
        state.csvImportPasteMode = true;
        render();
        const ta = document.querySelector('[data-csv-paste-area]');
        if (ta) ta.focus();
      } else if (a === 'csv-cancel-paste') {
        state.csvImportPasteMode = false;
        render();
      } else if (a === 'csv-parse-paste') {
        const ta = document.querySelector('[data-csv-paste-area]');
        loadCsvText(ta?.value || '');
      } else if (a === 'close-csv-import') {
        if (el.dataset.action === 'close-csv-import') {
          state.csvImportOpen = false;
          state.csvImportRows = [];
          state.csvImportMapping = {};
          render();
        }
      } else if (a === 'csv-perform-import') {
        performCsvImport();
      } else if (a === 'onb-import-load') {
        state.onboardingImportDone = true;
        render();
      } else if (a === 'onb-import-reset') {
        state.onboardingImportDone = false;
        render();
      } else if (a === 'onb-download-template') {
        toast('Template download started (demo).');
      } else if (a === 'onb-invite-send') {
        const inv = state.onboardingInvite;
        if (!inv.name.trim() || !inv.email.trim() || !/.+@.+\..+/.test(inv.email.trim())) {
          toast('Add a name and a valid email first.', 'error');
        } else {
          state.onboardingInviteSent = true;
          render();
          toast(`Invite sent to ${inv.email.trim()}`);
        }
      } else if (a === 'onb-pick-template') {
        state.onboardingTemplate = el.dataset.onbTemplate;
        render();
      } else if (a === 'onb-back') {
        state.onboardingStep = Math.max(1, state.onboardingStep - 1);
        render();
      } else if (a === 'onb-next') {
        if (state.onboardingStep < 3) {
          state.onboardingStep += 1;
          render();
        }
      } else if (a === 'onb-finish') {
        if (!state.onboardingTemplate) return;
        onboardingFinish(state.onboardingTemplate);
      } else if (a === 'onb-skip-all') {
        onboardingFinish(null);
      }
    };
  });

  // CSV file input
  const csvFile = document.querySelector('[data-csv-file]');
  if (csvFile) {
    csvFile.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        loadCsvText(String(reader.result || ''));
      };
      reader.onerror = () => toast('Could not read that file.', 'error');
      reader.readAsText(file);
      e.target.value = ''; // allow re-uploading the same file
    };
  }

  // CSV column mapping dropdowns
  $$('[data-csv-map]').forEach(el => el.onchange = (e) => {
    const col = +el.dataset.csvMap;
    const newField = e.target.value;
    // Ensure each field is mapped at most once: if newField is in use, clear that other column first
    if (newField) {
      Object.entries(state.csvImportMapping).forEach(([c, f]) => {
        if (+c !== col && f === newField) delete state.csvImportMapping[c];
      });
      state.csvImportMapping[col] = newField;
    } else {
      delete state.csvImportMapping[col];
    }
    render();
  });

  // Add Member modal field bindings
  $$('[data-am]').forEach(el => {
    const handler = (e) => {
      if (!state.addMemberDraft) return;
      const key = el.dataset.am;
      const val = e.target.value;
      // Re-render only when field affects layout (familyId or birthdate for age preview)
      const reRender = (key === 'familyId') || (key === 'birthdate');
      if (reRender) {
        // preserve focus on the changed field
        state.addMemberDraft[key] = val;
        render();
        const back = document.querySelector(`[data-am="${key}"]`);
        if (back && back.focus) back.focus();
      } else {
        state.addMemberDraft[key] = val;
      }
    };
    el.oninput = handler;
    el.onchange = handler;
  });

  // Onboarding invite inputs (no full re-render on input — keep focus)
  $$('[data-onb-invite]').forEach(el => {
    const handler = (e) => {
      const key = el.dataset.onbInvite;
      const prevValid = state.onboardingInvite.name.trim() && /.+@.+\..+/.test(state.onboardingInvite.email.trim());
      state.onboardingInvite[key] = e.target.value;
      const nowValid = state.onboardingInvite.name.trim() && /.+@.+\..+/.test(state.onboardingInvite.email.trim());
      // Re-render only when the Send button enabled/disabled state flips
      if (prevValid !== nowValid) {
        render();
        const back = document.querySelector(`[data-onb-invite="${key}"]`);
        if (back) { back.focus(); const v = back.value; back.setSelectionRange(v.length, v.length); }
      }
    };
    el.oninput = handler;
  });

  // Onboarding drop-zone — simulate file-drop visual feedback
  $$('[data-onb-drop]').forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('dragover');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      state.onboardingImportDone = true;
      render();
    });
  });

  // Fill modal inputs
  $$('[data-fill]').forEach(el => el.oninput = (e) => {
    state.fillAnswers[el.dataset.fill] = e.target.value;
  });
  $$('[data-fill-radio]').forEach(el => el.onchange = (e) => {
    state.fillAnswers[el.dataset.fillRadio] = e.target.value;
  });
  $$('[data-fill-check]').forEach(el => el.onchange = (e) => {
    const qid = el.dataset.fillCheck;
    const cur = Array.isArray(state.fillAnswers[qid]) ? state.fillAnswers[qid] : [];
    if (e.target.checked) state.fillAnswers[qid] = [...cur, e.target.value];
    else state.fillAnswers[qid] = cur.filter(x => x !== e.target.value);
  });
}

// ----- Save new member from Add Member modal -----
function saveNewMember() {
  const d = state.addMemberDraft;
  if (!d) return;
  if (!d.firstName.trim() || !d.lastName.trim()) {
    toast('First and last name are required.', 'error');
    return;
  }

  // Resolve family
  let familyId = d.familyId;
  if (familyId === '__new') {
    const name = d.newFamilyName.trim() || `${d.lastName.trim()} family`;
    const newFam = { id: uid('f'), name, address: d.address || '' };
    state.families.push(newFam);
    familyId = newFam.id;
  } else if (!familyId) {
    familyId = null;
  }

  const skills = d.skills.split(',').map(s => s.trim()).filter(Boolean);
  const m = {
    id: uid('m'),
    familyId,
    firstName: d.firstName.trim(),
    lastName: d.lastName.trim(),
    birthdate: d.birthdate || null,
    email: d.email.trim() || null,
    phone: d.phone.trim() || null,
    address: d.address.trim() || null,
    membership: d.membership || null,
    baptism: d.baptism || null,
    firstCommunion: d.firstCommunion || null,
    confirmation: d.confirmation || null,
    marriage: d.marriage || null,
    skills,
    notes: d.notes.trim(),
    activity: [{ t: 'Member added to ChurchPlannerPro', d: 'Just now' }]
  };
  state.members.push(m);
  state.selectedMemberId = m.id;
  state.peopleSubtab = 'members';
  state.tab = 'people';
  state.addMemberOpen = false;
  state.addMemberDraft = null;
  render();
  toast(`${fullName(m)} added`);
}

// ----- Submit a filled form: record response AND update member profile -----
function submitFill() {
  const f = formById(state.fillFormId);
  if (!f) return;

  // Required validation
  for (const q of f.questions) {
    const v = state.fillAnswers[q.id];
    const empty = v == null || v === '' || (Array.isArray(v) && v.length === 0);
    if (q.required && empty) {
      toast('Please answer required questions.', 'error');
      return;
    }
  }

  const m = memberById(state.fillAsMemberId);
  const updates = [];
  // Apply field mappings to member profile
  if (m) {
    for (const q of f.questions) {
      const v = state.fillAnswers[q.id];
      if (!q.mapsTo || v == null || v === '' || (Array.isArray(v) && v.length === 0)) continue;
      switch (q.mapsTo) {
        case 'name': {
          const parts = String(v).trim().split(/\s+/);
          if (parts.length >= 2) {
            m.firstName = parts.slice(0,-1).join(' ');
            m.lastName = parts.slice(-1)[0];
            updates.push('name');
          }
          break;
        }
        case 'email':   if (m.email !== v)   { m.email = v;   updates.push('email'); }   break;
        case 'phone':   if (m.phone !== v)   { m.phone = v;   updates.push('phone'); }   break;
        case 'address': if (m.address !== v) { m.address = v; updates.push('address'); } break;
        case 'skills':  m.skills = Array.from(new Set([...(m.skills||[]), ...(Array.isArray(v)?v:[v])])); updates.push('skills'); break;
        case 'notes':   if (v) { m.notes = (m.notes ? m.notes + '\n' : '') + v; updates.push('notes'); } break;
      }
    }
    m.activity = [{ t: `Submitted "${f.title}" form`, d: 'Just now' }, ...(m.activity||[])].slice(0, 8);
  }

  f.responses.unshift({
    memberId: state.fillAsMemberId,
    submittedAt: 'Just now',
    answers: { ...state.fillAnswers }
  });

  state.fillFormId = null;
  state.fillAnswers = {};
  state.formView = 'responses';
  render();

  if (updates.length) {
    toast(`Response recorded · ${memberById(state.fillAsMemberId).firstName}'s profile updated (${updates.join(', ')})`);
  } else {
    toast('Response recorded.');
  }
}

// ---------- Boot ----------
try {
  // Show onboarding once per browser. Add ?onboarding=1 to force-show again.
  const params = new URLSearchParams(window.location.search);
  if (params.get('onboarding') === '1') {
    localStorage.removeItem('cpp-onboarded');
    state.onboardingOpen = true;
  } else if (!localStorage.getItem('cpp-onboarded')) {
    state.onboardingOpen = true;
  }
} catch (e) {
  // localStorage unavailable (e.g. file:// + Safari private mode) — show anyway.
  state.onboardingOpen = true;
}
render();
</script>
</body>
