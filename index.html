<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ChurchPlanner Pro — AI operating system for churches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ====== Design tokens (from design-guidelines.pdf) ====== */
:root {
  --primary: #2563EB;
  --primary-hover: #1D4ED8;
  --primary-light: #DBEAFE;
  --cta: #22C55E;
  --cta-hover: #16A34A;
  --cta-light: #DCFCE7;
  --bg: #F5F7FA;
  --surface: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --text-secondary: #6B7280;
  --text-disabled: #9CA3AF;
  --warning: #F59E0B;
  --error: #EF4444;

  --xs: 4px; --sm: 8px; --md: 16px; --lg: 24px; --xl: 32px; --xxl: 48px;

  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(17, 24, 39, .04);
  --shadow-md: 0 4px 12px rgba(17, 24, 39, .06);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: 'Inter', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px; line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ====== Typography scale ====== */
h1 { font-size: 32px; font-weight: 600; line-height: 1.25; margin: 0; letter-spacing: -0.02em; }
h2 { font-size: 24px; font-weight: 600; line-height: 1.3;  margin: 0; letter-spacing: -0.01em; }
h3 { font-size: 20px; font-weight: 600; line-height: 1.35; margin: 0; }
.body-lg { font-size: 16px; font-weight: 400; }
.body    { font-size: 14px; font-weight: 400; }
.caption { font-size: 12px; font-weight: 400; color: var(--text-secondary); }
.muted   { color: var(--text-secondary); }
.mono    { font-variant-numeric: tabular-nums; }

/* ====== Buttons ====== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; min-height: 36px;
  font-family: inherit; font-size: 14px; font-weight: 500;
  border-radius: var(--r-md); cursor: pointer; border: 1px solid transparent;
  transition: background-color 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out, opacity 150ms ease-out;
  white-space: nowrap;
}
.btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.btn-primary   { background: var(--cta); color: #fff; }
.btn-primary:hover { background: var(--cta-hover); }
.btn-secondary { background: var(--surface); color: var(--primary); border-color: var(--primary); }
.btn-secondary:hover { background: var(--primary-light); }
.btn-ghost { background: transparent; color: var(--text); }
.btn-ghost:hover { background: var(--bg); }
.btn-text  { background: transparent; color: var(--primary); padding: 6px 8px; min-height: 32px; }
.btn-text:hover { color: var(--primary-hover); text-decoration: underline; }
.btn-sm { padding: 6px 12px; min-height: 30px; font-size: 13px; }
.btn[disabled] { opacity: .4; cursor: not-allowed; }

/* ====== Inputs ====== */
.input, .textarea, .select {
  width: 100%; padding: 10px 14px;
  font: inherit; color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  transition: border-color 150ms ease-out, box-shadow 150ms ease-out;
}
.textarea { min-height: 80px; resize: vertical; }
.input:focus, .textarea:focus, .select:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15);
}
label.field { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: var(--text); }

/* ====== Cards ====== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
}
.card.pad-md { padding: 16px; }
.card.hover { transition: box-shadow 150ms, transform 150ms, border-color 150ms; cursor: pointer; }
.card.hover:hover { box-shadow: var(--shadow-md); border-color: #CBD5E1; transform: translateY(-1px); }

/* ====== Chips / tags ====== */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; font-size: 12px; font-weight: 500;
  border-radius: var(--r-pill);
  background: var(--bg); color: var(--text-secondary);
  border: 1px solid var(--border);
}
.chip.blue  { background: var(--primary-light); color: var(--primary); border-color: transparent; }
.chip.green { background: var(--cta-light); color: var(--cta-hover); border-color: transparent; }
.chip.amber { background: #FEF3C7; color: #B45309; border-color: transparent; }
.chip.red   { background: #FEE2E2; color: #B91C1C; border-color: transparent; }
.chip.dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ====== Layout shell ====== */
.app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 4px;
  position: sticky; top: 0; height: 100vh;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px 16px;
}
.brand-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, #111827, #1F2937);
  color: #fff; display: grid; place-items: center;
  font-weight: 700; font-size: 15px; letter-spacing: -.02em;
}
.brand-name { font-weight: 600; font-size: 15px; }
.brand-sub  { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

.new-chat {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; margin: 4px 4px 12px;
  border: 1px solid var(--border); border-radius: var(--r-md);
  font-weight: 500; font-size: 13px; cursor: pointer; background: var(--surface);
  transition: background 150ms;
}
.new-chat:hover { background: var(--bg); }

.nav-section-label {
  padding: 10px 12px 6px; font-size: 11px; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin: 0 4px;
  border-radius: var(--r-md); cursor: pointer;
  color: var(--text); font-size: 13.5px; font-weight: 500;
  transition: background 150ms, color 150ms;
}
.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--primary-light); color: var(--primary); }
.nav-item .icon { width: 18px; height: 18px; stroke: currentColor; flex: none; }
.nav-item .count { margin-left: auto; font-size: 11px; color: var(--text-secondary); }
.nav-item.active .count { color: var(--primary); }

.sidebar-footer {
  margin-top: auto; padding: 12px 8px 4px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #334155; color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 600; flex: none; }
.sidebar-footer .name { font-size: 13px; font-weight: 500; }
.sidebar-footer .org { font-size: 11px; color: var(--text-secondary); }

/* ====== Main content ====== */
.main { min-width: 0; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 32px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5;
}
.crumb { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
.crumb strong { color: var(--text); font-weight: 600; }
.topbar .spacer { flex: 1; }

.page { padding: 48px 32px; max-width: 1180px; margin: 0 auto; width: 100%; }
.page.narrow { max-width: 880px; }

/* ====== Home (Harvey-style) ====== */
.home-hero { text-align: left; margin-bottom: 40px; }
.home-hero h1 { margin-bottom: 8px; }
.home-hero .sub { color: var(--text-secondary); font-size: 16px; }

.ask-card {
  background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 20px; box-shadow: var(--shadow-sm);
}
.ask-card textarea {
  width: 100%; border: none; outline: none; resize: none;
  font: inherit; font-size: 16px; line-height: 1.5;
  min-height: 72px; background: transparent;
}
.ask-card textarea::placeholder { color: var(--text-disabled); }

.ask-toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
}
.ask-toolbar .left { display: flex; gap: 4px; flex-wrap: wrap; }
.ask-toolbar .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.tool-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: var(--r-md);
  background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer;
  border: 1px solid transparent;
}
.tool-btn:hover { background: var(--bg); color: var(--text); }

.source-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.source-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; font-size: 12px;
  border-radius: var(--r-pill);
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
}

.suggestions-label {
  margin: 32px 0 12px;
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.04em; text-transform: uppercase;
}

.workflow-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
.wf-card .badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 8px; border-radius: var(--r-pill);
  background: var(--bg); color: var(--text-secondary);
  font-size: 11px; font-weight: 500;
}
.wf-card h3 { font-size: 16px; margin: 12px 0 6px; }
.wf-card p { color: var(--text-secondary); font-size: 13px; margin: 0; }
.wf-card .meta {
  margin-top: 16px; display: flex; justify-content: space-between; align-items: center;
  color: var(--text-secondary); font-size: 12px;
}
.wf-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: grid; place-items: center;
  color: var(--primary); background: var(--primary-light);
}
.wf-icon.green { color: var(--cta-hover); background: var(--cta-light); }
.wf-icon.amber { color: #B45309; background: #FEF3C7; }

.recent-list { display: grid; gap: 8px; }
.recent-row {
  display: grid; grid-template-columns: 24px 1fr auto auto; align-items: center; gap: 16px;
  padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface); cursor: pointer;
  transition: border-color 150ms, background 150ms;
}
.recent-row:hover { border-color: #CBD5E1; background: #FAFBFC; }
.recent-row .title { font-weight: 500; font-size: 14px; }
.recent-row .time  { color: var(--text-secondary); font-size: 12px; }

/* ====== Workflow run view ====== */
.run-layout { display: grid; grid-template-columns: 320px 1fr; gap: 32px; align-items: start; }
@media (max-width: 1100px) { .run-layout { grid-template-columns: 1fr; } }

.stepper { display: grid; gap: 6px; position: sticky; top: 80px; }
.step {
  display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: start;
  padding: 12px; border-radius: var(--r-md); cursor: pointer;
  transition: background 150ms;
}
.step:hover { background: var(--surface); }
.step-dot {
  width: 24px; height: 24px; border-radius: 50%;
  display: grid; place-items: center;
  background: var(--surface); border: 1.5px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
  margin-top: 2px;
}
.step.done .step-dot   { background: var(--cta); border-color: var(--cta); color: #fff; }
.step.active .step-dot { background: var(--primary); border-color: var(--primary); color: #fff; }
.step-title { font-size: 13.5px; font-weight: 500; color: var(--text); }
.step-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.step.active .step-title { color: var(--primary); }
.step .line {
  grid-column: 1; width: 1.5px; background: var(--border); margin: 0 auto; height: 20px;
}
.step.done .line { background: var(--cta); }

.run-panel { display: grid; gap: 16px; }
.run-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.run-header h2 { flex: 1; }
.run-header .status { font-size: 12px; color: var(--text-secondary); }

.section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }

.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.form-grid .full { grid-column: 1 / -1; }

.actions-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* ====== Document-like output panel ====== */
.doc-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 32px 40px;
}
.doc-panel h2 { margin-bottom: 8px; }
.doc-panel .doc-meta { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
.doc-panel p { margin: 0 0 12px; font-size: 15px; line-height: 1.65; }
.doc-panel em.citation {
  display: inline-block; background: var(--bg); color: var(--primary);
  padding: 0 6px; font-style: normal; font-size: 11px; font-weight: 500;
  border-radius: var(--r-pill); vertical-align: middle; margin: 0 2px;
}

/* ====== Tables ====== */
.table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden;
}
.table th, .table td {
  text-align: left; padding: 12px 16px; font-size: 13.5px;
  border-bottom: 1px solid var(--border);
}
.table th { font-weight: 600; color: var(--text-secondary); font-size: 12px; letter-spacing: 0.02em; text-transform: uppercase; background: #FAFBFC; }
.table tr:last-child td { border-bottom: none; }
.table tr.row-hover:hover { background: #FAFBFC; cursor: pointer; }

/* ====== Vendor cards / quotes ====== */
.quote-card {
  display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
  padding: 16px; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface);
}
.quote-card .vendor { font-weight: 600; font-size: 14px; }
.quote-card .price  { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
.quote-card .detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.quote-card.selected { border-color: var(--cta); background: var(--cta-light); }

/* ====== Charts (simple bars) ====== */
.bar-chart { display: grid; gap: 8px; }
.bar-row { display: grid; grid-template-columns: 110px 1fr 80px; align-items: center; gap: 12px; font-size: 13px; }
.bar-track { height: 10px; background: var(--bg); border-radius: var(--r-pill); overflow: hidden; }
.bar-fill { height: 100%; background: var(--primary); }
.bar-fill.green { background: var(--cta); }
.bar-fill.amber { background: var(--warning); }
.bar-fill.red   { background: var(--error); }
.bar-val { text-align: right; color: var(--text-secondary); font-variant-numeric: tabular-nums; }

/* Option tiles */
.option-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.option-tile {
  display: grid; grid-template-columns: 20px 1fr; gap: 12px; align-items: start;
  padding: 16px; border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer;
  transition: all 150ms;
}
.option-tile:hover { border-color: #CBD5E1; }
.option-tile.selected { border-color: var(--primary); background: var(--primary-light); }
.option-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); margin-top: 2px; flex: none; }
.option-tile.selected .option-radio { border-color: var(--primary); background: radial-gradient(circle, var(--primary) 40%, var(--primary-light) 45%); }
.option-tile .t { font-weight: 500; font-size: 14px; }
.option-tile .d { color: var(--text-secondary); font-size: 12.5px; margin-top: 4px; }

/* Email draft */
.email-draft {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden;
}
.email-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: grid; gap: 4px; font-size: 13px; }
.email-header .row { display: grid; grid-template-columns: 60px 1fr; gap: 8px; }
.email-header .row span:first-child { color: var(--text-secondary); }
.email-body { padding: 24px; }
.email-body p { margin: 0 0 14px; font-size: 14.5px; line-height: 1.65; }

/* ====== Utility ====== */
.row { display: flex; align-items: center; gap: 8px; }
.gap-sm { gap: 8px; } .gap-md { gap: 16px; } .gap-lg { gap: 24px; }
.stack { display: grid; gap: 16px; }
.stack-sm { display: grid; gap: 8px; }
.stack-lg { display: grid; gap: 24px; }
.mt-sm { margin-top: 8px; } .mt-md { margin-top: 16px; } .mt-lg { margin-top: 24px; } .mt-xl { margin-top: 32px; }
.mb-sm { margin-bottom: 8px; } .mb-md { margin-bottom: 16px; } .mb-lg { margin-bottom: 24px; }
.hidden { display: none !important; }

/* ====== Callout ====== */
.callout {
  display: grid; grid-template-columns: 20px 1fr; gap: 12px;
  padding: 14px 16px; border-radius: var(--r-md); font-size: 13.5px;
  border: 1px solid;
}
.callout.info  { background: var(--primary-light); border-color: transparent; color: var(--primary); }
.callout.success { background: var(--cta-light); border-color: transparent; color: var(--cta-hover); }
.callout.warn { background: #FEF3C7; border-color: transparent; color: #92400E; }

/* ====== Chat output messages ====== */
.chat-thread { display: grid; gap: 20px; }
.msg { display: grid; grid-template-columns: 32px 1fr; gap: 12px; }
.msg .avatar-sm { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 600; }
.msg.user .avatar-sm { background: #334155; color: #fff; }
.msg.ai .avatar-sm { background: #111827; color: #fff; }
.msg .bubble { padding-top: 4px; }
.msg .who { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.msg p { margin: 0 0 8px; }

/* Key metric cards */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.kpi { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); }
.kpi .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.kpi .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
.kpi .delta { font-size: 12px; font-weight: 500; }
.kpi .delta.up   { color: var(--cta-hover); }
.kpi .delta.down { color: var(--error); }

/* ====== Live chat workflow ====== */
.chat-page { display: flex; flex-direction: column; height: calc(100vh - 56px); max-width: 880px; margin: 0 auto; width: 100%; padding: 0 32px; }
.chat-head {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 0 16px; border-bottom: 1px solid var(--border);
}
.chat-head .wf-icon { width: 36px; height: 36px; }
.chat-head h2 { font-size: 18px; font-weight: 600; }
.chat-head .sub { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }

.chat-scroll { flex: 1; overflow-y: auto; padding: 24px 4px 16px; }
.chat-thread-live { display: flex; flex-direction: column; gap: 20px; }
.chat-msg { display: grid; grid-template-columns: 32px 1fr; gap: 12px; max-width: 100%; }
.chat-msg.user { grid-template-columns: 1fr 32px; }
.chat-msg .avatar-chat { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 600; flex: none; }
.chat-msg.ai .avatar-chat  { background: #111827; color: #fff; }
.chat-msg.user .avatar-chat { background: #334155; color: #fff; }
.chat-msg .bubble-chat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; font-size: 14.5px; line-height: 1.55;
  max-width: 100%;
}
.chat-msg.user .bubble-chat { background: var(--primary-light); border-color: transparent; color: var(--text); justify-self: end; }
.chat-msg .bubble-chat p { margin: 0 0 8px; }
.chat-msg .bubble-chat p:last-child { margin-bottom: 0; }
.chat-msg .panel { margin-top: 10px; }

/* inline data panels inside a chat bubble */
.chat-mini-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; margin-top: 4px; }
.chat-mini-table th, .chat-mini-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
.chat-mini-table th { font-weight: 600; color: var(--text-secondary); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; }
.chat-mini-table tr:last-child td { border-bottom: none; }

.chat-metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
.chat-metric { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.chat-metric .k { font-size: 11px; color: var(--text-secondary); }
.chat-metric .v { font-size: 16px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }

.chat-quote-list { display: grid; gap: 8px; margin-top: 4px; }
.chat-quote { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; }
.chat-quote.best { border-color: var(--cta); background: var(--cta-light); }
.chat-quote .v { font-weight: 600; font-size: 13.5px; }
.chat-quote .d { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.chat-quote .p { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }

.chat-email { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 4px; }
.chat-email-head { padding: 10px 14px; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 12.5px; display: grid; gap: 3px; }
.chat-email-head span.k { color: var(--text-secondary); margin-right: 8px; }
.chat-email-body { padding: 12px 14px; font-size: 13.5px; line-height: 1.6; }
.chat-email-body p { margin: 0 0 8px; }

.chat-typing { display: inline-flex; gap: 4px; padding: 12px 16px; }
.chat-typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-disabled); animation: blink 1.2s infinite both; }
.chat-typing span:nth-child(2) { animation-delay: .2s; }
.chat-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }

.chat-suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); }
.sug-chip {
  padding: 8px 14px; border-radius: 999px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 150ms, border-color 150ms, color 150ms;
}
.sug-chip:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.sug-chip.primary { background: var(--cta); color: #fff; border-color: var(--cta); }
.sug-chip.primary:hover { background: var(--cta-hover); border-color: var(--cta-hover); color: #fff; }

.chat-composer {
  border-top: 1px solid var(--border);
  padding: 12px 0 20px;
  background: var(--bg);
  position: sticky; bottom: 0;
}
.chat-composer-inner {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 8px 8px 8px 16px;
  box-shadow: var(--shadow-sm);
}
.chat-composer input {
  flex: 1; border: none; outline: none;
  font: inherit; font-size: 14.5px; background: transparent;
  padding: 6px 0;
}
.chat-composer .send-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--cta); color: #fff; border: none; cursor: pointer;
  display: grid; place-items: center;
}
.chat-composer .send-btn:hover { background: var(--cta-hover); }
.chat-composer .send-btn[disabled] { background: var(--text-disabled); cursor: not-allowed; }

/* ====== Vendor modal ====== */
.vmodal-bg {
  position: fixed; inset: 0; background: rgba(17, 24, 39, 0.4);
  display: grid; place-items: center; z-index: 50;
}
.vmodal {
  background: var(--surface); border-radius: 12px; width: 560px; max-width: 94vw;
  box-shadow: 0 20px 40px rgba(17,24,39,.2); overflow: hidden;
  display: flex; flex-direction: column; max-height: 90vh;
}
.vmodal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.vmodal-head h3 { font-size: 16px; font-weight: 600; }
.vmodal-body { padding: 20px; overflow-y: auto; }
.vmodal-foot { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* icons (inline svg sized) */
svg.icon { width: 18px; height: 18px; stroke-width: 1.8; fill: none; stroke: currentColor; }
svg.icon-sm { width: 14px; height: 14px; }
svg.icon-lg { width: 22px; height: 22px; }
</style>
</head>

<script>
/* Simple SPA router */
const routes = {
  'home':              { tpl: 'tpl-home',        crumb: ['Home'] },
  'workflows':         { tpl: 'tpl-workflows',   crumb: ['Workflows'] },
  'wf-workorder':      { tpl: 'tpl-wf-workorder',crumb: ['Workflows', 'Submit work order'] },
  'wf-workorder-resume':{tpl: 'tpl-wf-workorder',crumb: ['Home', 'Sanctuary HVAC'] },
  'wf-expense':        { tpl: 'tpl-wf-expense',  crumb: ['Workflows', 'Unplanned expense'] },
  'wf-donors':         { tpl: 'tpl-wf-donors',   crumb: ['Workflows', 'Re-engage lapsed donors'] },
  'chat':              { tpl: 'tpl-chat',        crumb: ['Chat'] },
  'history':           { tpl: 'tpl-history',     crumb: ['Chat history'] },
  'vault':             { tpl: 'tpl-vault',       crumb: ['Vault'] },
  'facilities':        { tpl: 'tpl-facilities',  crumb: ['Facilities'] },
  'finance':           { tpl: 'tpl-finance',     crumb: ['Finance & budget'] },
  'people':            { tpl: 'tpl-people',      crumb: ['People & donations'] },
  'events':            { tpl: 'tpl-events',      crumb: ['Events'] },
  'vendors':           { tpl: 'tpl-vendors',     crumb: ['Vendors'], onMount: renderVendors }
};
function go(route) {
  const r = routes[route] || routes.home;
  const tpl = document.getElementById(r.tpl);
  const view = document.getElementById('view');
  view.innerHTML = '';
  view.appendChild(tpl.content.cloneNode(true));
  const crumb = document.getElementById('crumb');
  crumb.innerHTML = r.crumb.map((c, i) => i === r.crumb.length - 1 ? `<strong>${c}</strong>` : `${c} <span>/</span>`).join(' ');
  document.querySelectorAll('.nav-item[data-route]').forEach(n => n.classList.toggle('active', n.dataset.route === route || (route.startsWith('wf-') && n.dataset.route === 'workflows')));
  window.scrollTo({top: 0, behavior: 'instant'});
  if (typeof r.onMount === 'function') r.onMount();
}

/* ====== New chat ====== */
function newChat() {
  go('home');
  setTimeout(() => {
    const input = document.getElementById('ask-input');
    if (input) input.focus();
  }, 50);
}

/* ====== Chat workflow engine ====== */
/* Each flow is a sequence of "turns". The engine shows flow.opening (AI msg + suggestion chips).
   When the user submits (chip click OR Enter with text), we append their message, show a typing
   indicator, then append the next AI turn (which includes its own next set of suggestion chips).
   The last turn has chips: [] which ends the flow. */

const FLOWS = {
  workorder: {
    title: 'Submit work order',
    sub: 'Facilities · pulling from facility log + vendor history',
    icon: '<svg class="icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.7 6.3a4 4 0 00-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 005.4-5.4l-2.5 2.5-2.1-2.1 2.5-2.4z"/></svg>',
    iconClass: '',
    opening: {
      ai: "<p>Hi Tracy — I can help you log a facilities work order. <strong>What's broken, and where in the building?</strong></p><p class=\"muted\" style=\"font-size:13px;margin-top:6px\">I'll pull request history, check policy, and get vendor quotes as we go.</p>",

      {
        ai: `<p>Got it. I checked the facilities log — the sanctuary has a <strong>2018 Trane rooftop unit</strong> that's had 2 prior issues (last one Dec 2024). Sounds like the compressor again.</p>

        chips: ['Get 3 quotes', 'Straight to Cornerstone', 'Show vendor history first']
      },
      {
        ai: `<p>Sent RFQs. Three quotes back within the hour:</p>
             <div class="panel">
               <div class="chat-quote-list">
                 <div class="chat-quote best">
                   <div><div class="v">Cornerstone HVAC <span class="chip green" style="margin-left:6px">Recommended</span></div><div class="d">Saturday 8am · same-day compressor swap · 2yr warranty</div></div>
                   <div class="p">$3,850</div>
                 </div>

/* Chat state */
let chatState = null; // { flowKey, flow, turnIndex }

function startChat(flowKey, seedText) {
  const flow = FLOWS[flowKey];
  if (!flow) return go('home');
  chatState = { flowKey, flow, turnIndex: 0 };
  go('chat');
  // Populate header
  const iconEl = document.getElementById('chat-icon');
  iconEl.innerHTML = flow.icon;
  if (flow.iconClass) iconEl.classList.add(flow.iconClass);
  document.getElementById('chat-title').textContent = flow.title;
  document.getElementById('chat-sub').textContent = flow.sub;
  const thread = document.getElementById('chat-thread');
  thread.innerHTML = '';
  // If the user typed something in the Ask box, show it as the first user message
  if (seedText && seedText.trim()) {
    appendUserMsg(seedText.trim());
  }
  // Show opening AI message after short delay
  showTyping();
  setTimeout(() => {
    removeTyping();
    appendAiMsg(flow.opening.ai);
    renderChips(flow.opening.chips);
    focusInput();
  }, 600);
  // Wire input Enter
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatSubmit(); }
  });
  // Breadcrumb
  document.getElementById('crumb').innerHTML = `Workflows <span>/</span> <strong>${flow.title}</strong>`;
}

function appendAiMsg(html) {
  const thread = document.getElementById('chat-thread');
  const node = document.createElement('div');
  node.className = 'chat-msg ai';
  node.innerHTML = `<div class="avatar-chat">AI</div><div class="bubble-chat">${html}</div>`;
  thread.appendChild(node);
  scrollChat();
}
function appendUserMsg(text) {
  const thread = document.getElementById('chat-thread');
  const node = document.createElement('div');
  node.className = 'chat-msg user';
  const safe = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  node.innerHTML = `<div class="bubble-chat">${safe}</div><div class="avatar-chat">TM</div>`;
  thread.appendChild(node);
  scrollChat();
}
function showTyping() {
  const thread = document.getElementById('chat-thread');
  const node = document.createElement('div');
  node.className = 'chat-msg ai';
  node.id = 'chat-typing-row';
  node.innerHTML = `<div class="avatar-chat">AI</div><div class="bubble-chat" style="padding:0"><div class="chat-typing"><span></span><span></span><span></span></div></div>`;
  thread.appendChild(node);
  scrollChat();
}
function removeTyping() {
  const t = document.getElementById('chat-typing-row');
  if (t) t.remove();
}
function renderChips(chips) {
  const box = document.getElementById('chat-sugs');
  box.innerHTML = '';
  if (!chips || chips.length === 0) {
    // End of flow — offer restart chips
    const endBox = document.createElement('div');
    endBox.style.cssText = 'font-size:12.5px;color:var(--text-secondary);';
    endBox.textContent = 'This workflow is complete.';
    box.appendChild(endBox);
    const back = document.createElement('button');
    back.className = 'sug-chip';
    back.textContent = '← Back to home';
    back.onclick = () => go('home');
    box.appendChild(back);
    document.getElementById('chat-input').disabled = true;
    document.getElementById('chat-send').disabled = true;
    document.getElementById('chat-status').textContent = 'Complete';
    document.getElementById('chat-status').className = 'chip green dot';
    return;
  }
  chips.forEach((chipText, i) => {
    const el = document.createElement('button');
    el.className = 'sug-chip' + (i === 0 ? ' primary' : '');
    el.textContent = chipText;
    el.onclick = () => submitUserTurn(chipText);
    box.appendChild(el);
  });
}
function chatSubmit() {
  const input = document.getElementById('chat-input');
  const val = (input.value || '').trim();
  if (!val) return;
  submitUserTurn(val);
  input.value = '';
}
function submitUserTurn(text) {
  if (!chatState) return;
  appendUserMsg(text);
  // Clear chips while AI "thinks"
  document.getElementById('chat-sugs').innerHTML = '';
  showTyping();
  const nextTurn = chatState.flow.turns[chatState.turnIndex];
  const delay = 700 + Math.random() * 500;
  setTimeout(() => {
    removeTyping();
    if (!nextTurn) {
      appendAiMsg(`<p class="muted">(End of scripted flow — thanks for exploring the prototype!)</p>`);
      renderChips([]);
      return;
    }
    appendAiMsg(nextTurn.ai);
    chatState.turnIndex += 1;
    renderChips(nextTurn.chips);
    focusInput();
  }, delay);
}
function scrollChat() {
  const sc = document.getElementById('chat-scroll');
  if (sc) sc.scrollTop = sc.scrollHeight;
}
function focusInput() {
  const i = document.getElementById('chat-input');
  if (i && !i.disabled) i.focus();
}

/* ====== Ask-box routing ====== */
function runAsk() {
  const raw = (document.getElementById('ask-input').value || '').trim();
  const v = raw.toLowerCase();
  let flowKey = 'workorder'; // default
  if (v.includes('donor') || v.includes('lapsed') || v.includes('giving') || v.includes('tithe')) flowKey = 'donors';
  else if (v.includes('expense') || v.includes('budget') || v.includes('forecast') || v.includes('roof') || v.includes('cash') || v.includes('unplanned')) flowKey = 'expense';
  else if (v.includes('hvac') || v.includes('broken') || v.includes('repair') || v.includes('fix') || v.includes('work order') || v.includes('facilit') || v.includes('leak') || v.includes('light')) flowKey = 'workorder';
  // If no text, just default to work order
  startChat(flowKey, raw);
}

function statusChipClass(s) {
  if (s === 'Preferred') return 'green';
  if (s === 'Approved') return 'blue';
  return 'amber';
}

function renderVendors() {
  const tbody = document.getElementById('vendors-tbody');
  if (!tbody) return;
  tbody.innerHTML = vendors.map(v => `
    <tr class="row-hover">
      <td><strong>${escapeHtml(v.name)}</strong></td>
      <td>${escapeHtml(v.category)}</td>
      <td>${escapeHtml(v.contact || '—')}</td>
      <td class="mono">${v.jobs}</td>
      <td class="mono">${v.rating ? v.rating.toFixed(1) + ' ★' : '—'}</td>
      <td><span class="chip ${statusChipClass(v.status)} dot">${escapeHtml(v.status)}</span></td>
    </tr>
  `).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showVendorForm() {
  document.getElementById('vendor-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('v-name')?.focus(), 50);
}
function hideVendorForm() {
  document.getElementById('vendor-modal').classList.add('hidden');
  ['v-name', 'v-contact', 'v-reach', 'v-notes'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
}
function saveVendor() {
  const name = document.getElementById('v-name').value.trim();
  if (!name) { document.getElementById('v-name').focus(); return; }
  const category = document.getElementById('v-cat').value;
  const status = document.getElementById('v-status').value;
  const contactName = document.getElementById('v-contact').value.trim();
  const reach = document.getElementById('v-reach').value.trim();
  const contact = [contactName, reach].filter(Boolean).join(' · ') || '—';
  vendors.unshift({ name, category, contact, jobs: 0, rating: null, status });
  hideVendorForm();
  renderVendors();
}
